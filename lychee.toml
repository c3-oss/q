# lychee — link checker config
#
# Docs: https://lychee.cli.rs/usage/config/

# Treat 429 (rate-limited) as success — lychee retries and we don't want
# transient throttling to block CI.
accept = [200, 204, 429]

# Skip well-known placeholders, localhost-only endpoints, and examples
# embedded in documentation.
exclude = [
  "^https?://(localhost|127\\.0\\.0\\.1|0\\.0\\.0\\.0)(:\\d+)?(/.*)?$",
  "^https?://.*\\.example\\.(com|org|net)(/.*)?$",
  "^https?://example\\.(com|org|net)(/.*)?$",
  "^https://github\\.com/c3-oss/go-template/actions/workflows/.*$",
]

# These hosts respond unreliably to HEAD probes from CI runners.
exclude_path = [
  "node_modules",
  "vendor",
  "dist",
]

max_redirects = 5
timeout = 20
no_progress = true
