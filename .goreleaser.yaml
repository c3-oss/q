version: 2

project_name: myapp

before:
  hooks:
    - go mod tidy

builds:
  - id: myapp
    main: ./cmd/myapp
    binary: myapp
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/c3-oss/go-template/internal/buildinfo.Version={{.Version}}
      - -X github.com/c3-oss/go-template/internal/buildinfo.Commit={{.Commit}}
      - -X github.com/c3-oss/go-template/internal/buildinfo.BuildDate={{.Date}}

archives:
  - id: default
    formats: [tar.gz]
    name_template: '{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}'
    files:
      - README.md
      - LICENSE*

checksum:
  name_template: checksums.txt
  algorithm: sha256

# Software Bill of Materials — one SPDX SBOM per archive, generated by
# Syft. Requires `syft` on PATH (installed by the release workflow).
sboms:
  - id: default
    artifacts: archive
    documents:
      - '{{ .ArtifactName }}.spdx.json'

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'
      - Merge pull request
      - Merge branch
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]-]+\))??!?:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\([[:word:]-]+\))??!?:.+$'
      order: 1
    - title: Others
      order: 999

release:
  draft: false
  prerelease: auto
  name_template: '{{ .ProjectName }} {{ .Version }}'

